# Smithery configuration — @perceptdot/vercel
# AI agent vision for Vercel deployments with ROI measurement
# https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - vercelToken
    properties:
      vercelToken:
        type: string
        description: "Vercel API token. Generate at vercel.com/account/tokens"
      vercelTeamId:
        type: string
        description: "Vercel Team ID (optional). Required for team project access."
  commandFunction: |-
    config => ({
      command: 'npx',
      args: ['-y', '@perceptdot/vercel'],
      env: {
        VERCEL_TOKEN: config.vercelToken,
        ...(config.vercelTeamId ? { VERCEL_TEAM_ID: config.vercelTeamId } : {})
      }
    })
