# Smithery configuration — @perceptdot/ga4
# AI agent vision for Google Analytics 4 with ROI measurement
# https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - ga4PropertyId
      - googleServiceAccountKey
    properties:
      ga4PropertyId:
        type: string
        description: "GA4 Property ID (number). GA4 Console → Admin → Property Settings → Property ID"
      googleServiceAccountKey:
        type: string
        description: "Google Service Account Key JSON string. Requires Analytics Data API viewer permission."
  commandFunction: |-
    config => ({
      command: 'npx',
      args: ['-y', '@perceptdot/ga4'],
      env: {
        GA4_PROPERTY_ID: config.ga4PropertyId,
        GOOGLE_SERVICE_ACCOUNT_KEY: config.googleServiceAccountKey
      }
    })
