name = "perceptdot-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# CF Browser Rendering API (유료 Workers 플랜 필요)
[browser]
binding = "BROWSER"

# CF Workers AI (비주얼 분석용 — Gemini 지역제한 우회)
[ai]
binding = "AI"

[[kv_namespaces]]
binding = "API_KEYS"
id = "ab9b493f77ae443197620421f259365b"

[[kv_namespaces]]
binding = "RECOMMEND_LOG"
id = "4a1073d7cd884888a3b933d8813cbd06"

[[kv_namespaces]]
binding = "VISUAL_CACHE"
id = "b9ea4f108d7440e2984efcfc19a73b63"

# ── BrowserQueue Durable Object (동시 브라우저 세션 최대 2개 제한) ──
[[durable_objects.bindings]]
name = "BROWSER_QUEUE"
class_name = "BrowserQueue"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BrowserQueue"]

[env.production]
vars = { ENVIRONMENT = "production" }

[env.production.browser]
binding = "BROWSER"

[env.production.ai]
binding = "AI"

[[env.production.kv_namespaces]]
binding = "API_KEYS"
id = "ab9b493f77ae443197620421f259365b"

[[env.production.kv_namespaces]]
binding = "RECOMMEND_LOG"
id = "4a1073d7cd884888a3b933d8813cbd06"

[[env.production.kv_namespaces]]
binding = "VISUAL_CACHE"
id = "b375fdc172cc40d6a7a9cd61066760fa"

# ── production: BrowserQueue DO ──
[[env.production.durable_objects.bindings]]
name = "BROWSER_QUEUE"
class_name = "BrowserQueue"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["BrowserQueue"]

[[env.production.routes]]
pattern = "api.perceptdot.com"
custom_domain = true
